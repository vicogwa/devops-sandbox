services:
  nginx:
    image: nginx:1.25-alpine
    container_name: sandbox-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sandbox-mgmt
    labels:
      sandbox.managed: "false"
      sandbox.role: "nginx"

  api:
    build:
      context: .
      dockerfile: platform/Dockerfile.api
    container_name: sandbox-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-5050}:5050"
    volumes:
      - ./platform:/app/platform:ro
      - ./envs:/app/envs
      - ./logs:/app/logs
      - ./nginx/conf.d:/app/nginx/conf.d
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DEFAULT_TTL=${DEFAULT_TTL:-1800}
      - NGINX_CONTAINER=${NGINX_CONTAINER:-sandbox-nginx}
      - PLATFORM_BASE_PORT=${PLATFORM_BASE_PORT:-8100}
      - API_PORT=${API_PORT:-5050}
    env_file:
      - .env
    networks:
      - sandbox-mgmt
    depends_on:
      - nginx
    labels:
      sandbox.managed: "false"
      sandbox.role: "api"

networks:
  sandbox-mgmt:
    name: sandbox-mgmt
    driver: bridge